<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>I Love You</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      overflow: hidden;
      background: #000;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 50% 56%, rgba(255, 45, 105, 0.08), transparent 34%),
        radial-gradient(circle at center, #070204 0%, #000 64%, #000 100%);
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: block;
      cursor: pointer;
      touch-action: none;
    }

    .love-text {
      position: fixed;
      left: 50%;
      top: var(--heart-y, 56%);
      z-index: 2;
      color: #fff;
      width: 94vw;
      max-width: 720px;
      color: #fff;
      font-family: "Comic Sans MS", "Cooper Black", "Arial Rounded MT Bold", cursive;
      font-size: clamp(42px, 12vw, 92px);
      font-weight: 800;
      letter-spacing: 0;
      opacity: 0;
      pointer-events: none;
      text-align: center;
      white-space: nowrap;
      text-shadow:
        0 0 12px rgba(255, 255, 255, 0.96),
        0 0 28px #ff69b4,
        0 0 68px rgba(255, 20, 80, 0.88),
        0 14px 48px rgba(0, 0, 0, 0.88);
      transition: opacity 1s ease, transform 1s ease;
      transform: translate(-50%, calc(-50% + 12px)) scale(0.98);
    }

    .love-text.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    @media (max-width: 520px) {
      .love-text {
        font-size: clamp(38px, 13vw, 54px);
      }
    }
  </style>
</head>
<body>
  <canvas id="heartCanvas"></canvas>
  <div class="love-text" id="loveText">I ❤ YOU</div>

  <script>
    const canvas = document.getElementById("heartCanvas");
    const ctx = canvas.getContext("2d");
    const textDom = document.getElementById("loveText");

    let width = 0;
    let height = 0;
    let dpr = 1;
    let particles = [];
    let balloons = [];
    let stars = [];
    let heartBubbles = [];
    let bursts = [];
    let heartPoints = [];
    let countPhase = true;
    let count = 3;
    let countTimer = null;
    let countStartedAt = 0;
    let frame = 0;
    let balloonTicker = 0;

    const mouse = {
      x: 0,
      y: 0,
      down: false
    };

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 1.15);
      const viewport = window.visualViewport;
      width = Math.floor(viewport ? viewport.width : window.innerWidth);
      height = Math.floor(viewport ? viewport.height : window.innerHeight);
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      mouse.x = width / 2;
      mouse.y = height / 2;
      document.documentElement.style.setProperty("--heart-y", `${heartCenterY()}px`);
      init();
    }

    function heartCenterY() {
      return width < 700 ? height * 0.48 : height * 0.5;
    }

    function createStars() {
      const total = Math.min(46, Math.max(20, Math.floor((width * height) / 28000)));
      stars = Array.from({ length: total }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        size: 0.6 + Math.random() * 1.8,
        alpha: 0.18 + Math.random() * 0.46,
        phase: Math.random() * Math.PI * 2,
        speed: 0.014 + Math.random() * 0.024
      }));
    }

    function createHeartPoints() {
      const points = [];
      const scale = width < 700
        ? Math.min(width * 0.016, height * 0.0105)
        : Math.min(width, height) * 0.018;

      for (let angle = 0; angle < Math.PI * 2; angle += 0.018) {
        const x = 16 * Math.pow(Math.sin(angle), 3);
        const y = -(
          13 * Math.cos(angle) -
          5 * Math.cos(2 * angle) -
          2 * Math.cos(3 * angle) -
          Math.cos(4 * angle)
        );
        points.push({
          x: x * scale,
          y: y * scale,
          phase: Math.random() * Math.PI * 2
        });
      }

      return points;
    }

    class Particle {
      constructor(index) {
        this.index = index;
        this.reset(true);
      }

      reset(scatter = false) {
        const p = heartPoints[this.index % heartPoints.length] || { x: 0, y: 0 };
        const spread = scatter ? Math.max(width, height) * 0.42 : 48;
        const angle = Math.random() * Math.PI * 2;
        const radius = Math.random() * spread;

        this.target = p;
        this.x = width / 2 + p.x + Math.cos(angle) * radius;
        this.y = heartCenterY() + p.y + Math.sin(angle) * radius;
        this.px = this.x;
        this.py = this.y;
        this.size = Math.random() * 1.8 + 1.1;
        this.hue = 338 + Math.random() * 34;
        this.vx = (Math.random() - 0.5) * 1.4;
        this.vy = (Math.random() - 0.5) * 1.4;
      }

      update() {
        const beat = countPhase ? 0.65 : 1 + Math.sin(frame * 0.052 + this.target.phase) * 0.04;
        const tx = width / 2 + this.target.x * beat;
        const ty = heartCenterY() + this.target.y * beat;

        this.px = this.x;
        this.py = this.y;

        const ax = (tx - this.x) * (countPhase ? 0.006 : 0.014);
        const ay = (ty - this.y) * (countPhase ? 0.006 : 0.014);
        this.vx = (this.vx + ax) * 0.9;
        this.vy = (this.vy + ay) * 0.9;
        this.x += this.vx;
        this.y += this.vy;

        if (!countPhase && Math.random() < 0.003) {
          this.hue = 338 + Math.random() * 34;
        }
      }

      draw() {
        const speed = Math.hypot(this.vx, this.vy);
        ctx.strokeStyle = `hsla(${this.hue}, 100%, 66%, ${Math.min(0.52, 0.2 + speed * 0.09)})`;
        ctx.lineWidth = this.size + speed * 0.08;
        ctx.beginPath();
        ctx.moveTo(this.px, this.py);
        ctx.lineTo(this.x, this.y);
        ctx.stroke();

        if (this.index % 2 === 0 || speed > 0.8) {
          ctx.fillStyle = `hsl(${this.hue}, 100%, 66%)`;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    class Balloon {
      constructor(x, y, automatic = false) {
        this.x = x + (Math.random() - 0.5) * 28;
        this.y = y + (Math.random() - 0.5) * 20;
        this.r = Math.random() * 14 + 10;
        this.color = ["#ff5a8c", "#ff97c1", "#ffd166", "#ff3f6f", "#fff1f5"][Math.floor(Math.random() * 5)];
        this.vx = (Math.random() - 0.5) * 1.1;
        this.vy = -Math.random() * 1.8 - 0.8;
        this.alpha = 1;
        this.swing = Math.random() * Math.PI * 2;
        this.automatic = automatic;
      }

      update() {
        this.swing += 0.035;
        this.x += this.vx + Math.sin(this.swing) * 0.15;
        this.y += this.vy;
        if (this.y < -50) {
          this.alpha -= 0.025;
        }
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.alpha);
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(this.x - this.r / 3, this.y - this.r / 3, this.r / 4, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 255, 255, 0.58)";
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 220, 230, 0.5)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y + this.r);
        ctx.quadraticCurveTo(this.x + Math.sin(this.swing) * 8, this.y + this.r + 18, this.x, this.y + this.r + 34);
        ctx.stroke();
        ctx.restore();
      }
    }

    class HeartBubble {
      constructor() {
        this.x = Math.random() * width;
        this.y = height + 28;
        this.size = 8 + Math.random() * 20;
        this.vx = (Math.random() - 0.5) * 0.45;
        this.vy = -0.45 - Math.random() * 0.85;
        this.alpha = 0.24 + Math.random() * 0.38;
        this.phase = Math.random() * Math.PI * 2;
        this.angle = (Math.random() - 0.5) * 0.8;
        this.spin = (Math.random() - 0.5) * 0.012;
      }

      update() {
        this.phase += 0.025;
        this.angle += this.spin;
        this.x += this.vx + Math.sin(this.phase) * 0.24;
        this.y += this.vy;
        if (this.y < -40) this.alpha -= 0.02;
      }

      draw() {
        drawHeart(this.x, this.y, this.size, this.angle, `rgba(255, 80, 115, ${Math.max(0, this.alpha)})`);
      }
    }

    class Burst {
      constructor(x, y) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.4 + Math.random() * 5.2;
        this.x = x;
        this.y = y;
        this.px = x;
        this.py = y;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 40 + Math.random() * 28;
        this.maxLife = this.life;
        this.hue = 336 + Math.random() * 38;
      }

      update() {
        this.px = this.x;
        this.py = this.y;
        this.vx *= 0.94;
        this.vy *= 0.94;
        this.x += this.vx;
        this.y += this.vy;
        this.life -= 1;
      }

      draw() {
        const alpha = Math.max(0, this.life / this.maxLife);
        ctx.strokeStyle = `hsla(${this.hue}, 100%, 68%, ${alpha})`;
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.moveTo(this.px, this.py);
        ctx.lineTo(this.x, this.y);
        ctx.stroke();
      }
    }

    function drawHeart(x, y, size, angle, fillStyle) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.scale(size / 32, size / 32);
      ctx.beginPath();
      ctx.moveTo(0, 10);
      ctx.bezierCurveTo(-28, -8, -16, -32, 0, -18);
      ctx.bezierCurveTo(16, -32, 28, -8, 0, 10);
      ctx.closePath();
      ctx.fillStyle = fillStyle;
      ctx.fill();
      ctx.restore();
    }

    function init() {
      createStars();
      heartPoints = createHeartPoints();
      const particleCount = Math.min(520, Math.max(260, Math.floor((width * height) / 3800)));
      particles = Array.from({ length: particleCount }, (_, index) => new Particle(index));
      balloons = balloons.slice(-36);
      heartBubbles = heartBubbles.slice(-22);
      bursts = [];
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, width, height);
    }

    function startCountDown() {
      clearInterval(countTimer);
      count = 3;
      countPhase = true;
      countStartedAt = performance.now();
      textDom.classList.remove("show");

      countTimer = setInterval(() => {
        count -= 1;
        if (count <= 0) {
          clearInterval(countTimer);
          countPhase = false;
          textDom.classList.add("show");
          for (const particle of particles) {
            particle.reset(true);
          }
          celebrate();
        }
      }, 1000);
    }

    function celebrate() {
      for (let i = 0; i < 46; i += 1) {
        bursts.push(new Burst(width / 2, height / 2));
      }
    }

    function createBalloon(x, y, num = 8, automatic = false) {
      const room = Math.max(0, 46 - balloons.length);
      const total = Math.min(num, room);
      for (let i = 0; i < total; i += 1) {
        balloons.push(new Balloon(x, y, automatic));
      }
    }

    function autoBalloons() {
      balloonTicker += 1;
      const interval = width < 700 ? 34 : 26;
      if (balloonTicker % interval === 0) {
        const x = Math.random() * width;
        const y = height + 42;
        createBalloon(x, y, 1, true);
      }
      const heartInterval = width < 700 ? 58 : 44;
      if (balloonTicker % heartInterval === 0 && heartBubbles.length < 24) {
        heartBubbles.push(new HeartBubble());
      }
    }

    function drawStars() {
      for (const star of stars) {
        const pulse = (Math.sin(frame * star.speed + star.phase) + 1) * 0.5;
        ctx.fillStyle = `rgba(255, 226, 232, ${star.alpha * (0.35 + pulse * 0.65)})`;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size * (0.7 + pulse * 0.5), 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawDottedHeartOutline() {
      const centerX = width / 2;
      const centerY = heartCenterY();
      const scale = width < 700
        ? Math.min(width * 0.022, height * 0.014)
        : Math.min(width, height) * 0.0205;
      const total = width < 700 ? 176 : 180;

      ctx.save();
      ctx.globalCompositeOperation = "lighter";

      for (let i = 0; i < total; i += 1) {
        const t = (i / total) * Math.PI * 2;
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = -(
          13 * Math.cos(t) -
          5 * Math.cos(2 * t) -
          2 * Math.cos(3 * t) -
          Math.cos(4 * t)
        );
        const sparkle = (Math.sin(frame * 0.07 + i * 0.53) + 1) * 0.5;
        const jitter = Math.sin(frame * 0.018 + i) * 1.8;
        const px = centerX + x * scale + Math.cos(t) * jitter;
        const py = centerY + y * scale + Math.sin(t) * jitter;
        const radius = (width < 700 ? 2.7 : 2.7) + sparkle * 1.8;
        const alpha = 0.74 + sparkle * 0.26;

        ctx.fillStyle = `rgba(255, 246, 248, ${alpha})`;
        ctx.beginPath();
        ctx.arc(px, py, radius, 0, Math.PI * 2);
        ctx.fill();

        if (i % 3 === 0) {
          ctx.fillStyle = `rgba(255, 92, 138, ${0.32 + sparkle * 0.28})`;
          ctx.beginPath();
          ctx.arc(px, py, radius * 2.4, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.restore();
    }

    function drawCountdownNumber() {
      const elapsed = performance.now() - countStartedAt;
      const stepProgress = (elapsed % 1000) / 1000;
      const alpha = stepProgress < 0.88 ? 1 : Math.max(0, 1 - (stepProgress - 0.88) / 0.12);
      const digit = String(count);
      let fontSize = Math.min(width < 700 ? 230 : 260, height * 0.42);
      const maxTextWidth = width * 0.78;
      const maxTextHeight = height * 0.48;
      const countdownFont = width < 700
        ? "Arial, Helvetica, sans-serif"
        : "\"Arial Black\", Arial, sans-serif";

      ctx.save();
      ctx.font = `900 ${fontSize}px ${countdownFont}`;
      let metrics = ctx.measureText(digit);
      let textWidth = metrics.width;
      let textHeight = (metrics.actualBoundingBoxAscent || fontSize * 0.72) +
        (metrics.actualBoundingBoxDescent || fontSize * 0.22);

      while ((textWidth > maxTextWidth || textHeight > maxTextHeight) && fontSize > 80) {
        fontSize -= 6;
        ctx.font = `900 ${fontSize}px ${countdownFont}`;
        metrics = ctx.measureText(digit);
        textWidth = metrics.width;
        textHeight = (metrics.actualBoundingBoxAscent || fontSize * 0.72) +
          (metrics.actualBoundingBoxDescent || fontSize * 0.22);
      }

      ctx.translate(width / 2, height / 2);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.globalAlpha = alpha;
      ctx.font = `900 ${fontSize}px ${countdownFont}`;
      const baselineOffset = ((metrics.actualBoundingBoxAscent || fontSize * 0.72) -
        (metrics.actualBoundingBoxDescent || fontSize * 0.22)) / 2;

      ctx.shadowColor = "rgba(255, 105, 180, 0.96)";
      ctx.shadowBlur = width < 700 ? 34 : 42;
      ctx.fillStyle = "rgba(255, 255, 255, 0.98)";
      ctx.fillText(digit, 0, baselineOffset);

      ctx.shadowColor = "rgba(255, 30, 125, 0.68)";
      ctx.shadowBlur = width < 700 ? 82 : 96;
      ctx.fillStyle = "rgba(255, 255, 255, 0.76)";
      ctx.fillText(digit, 0, baselineOffset);

      ctx.shadowBlur = 0;
      ctx.fillStyle = "rgba(255, 255, 255, 1)";
      ctx.fillText(digit, 0, baselineOffset);
      ctx.restore();
    }

    function setPointer(event) {
      const point = event.touches ? event.touches[0] : event;
      if (!point) return;
      mouse.x = point.clientX;
      mouse.y = point.clientY;
    }

    function animate() {
      frame += 1;

      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
      ctx.fillRect(0, 0, width, height);

      if (countPhase) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.42)";
        ctx.fillRect(0, 0, width, height);
        drawCountdownNumber();
        requestAnimationFrame(animate);
        return;
      }

      drawStars();

      ctx.globalCompositeOperation = "lighter";
      ctx.lineCap = "round";
      for (const particle of particles) {
        particle.update();
        particle.draw();
      }

      bursts = bursts.filter((burst) => burst.life > 0);
      for (const burst of bursts) {
        burst.update();
        burst.draw();
      }
      drawDottedHeartOutline();

      ctx.globalCompositeOperation = "source-over";
      autoBalloons();
      balloons = balloons.filter((balloon) => balloon.alpha > 0);
      for (const balloon of balloons) {
        balloon.update();
        balloon.draw();
      }

      heartBubbles = heartBubbles.filter((heart) => heart.alpha > 0);
      for (const heart of heartBubbles) {
        heart.update();
        heart.draw();
      }

      requestAnimationFrame(animate);
    }

    window.addEventListener("resize", resize);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", resize);
    }
    window.addEventListener("mousemove", setPointer);

    canvas.addEventListener("mousedown", (event) => {
      mouse.down = true;
      setPointer(event);
    });

    canvas.addEventListener("mousemove", (event) => {
      if (mouse.down) setPointer(event);
    });

    canvas.addEventListener("mouseup", () => {
      mouse.down = false;
    });

    canvas.addEventListener("mouseleave", () => {
      mouse.down = false;
    });

    canvas.addEventListener("touchstart", (event) => {
      event.preventDefault();
      const touch = event.touches[0];
      mouse.down = true;
      setPointer(event);
    }, { passive: false });

    canvas.addEventListener("touchmove", (event) => {
      event.preventDefault();
      const touch = event.touches[0];
      if (mouse.down && touch) setPointer(event);
    }, { passive: false });

    canvas.addEventListener("touchend", () => {
      mouse.down = false;
    });

    resize();
    animate();
    window.setTimeout(startCountDown, 800);
  </script>
</body>
</html>
