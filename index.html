<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>I Love You</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: manipulation;
      font-family: "Arial Rounded MT Bold", "Microsoft YaHei", Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      display: block;
      z-index: 1;
    }

    #scene {
      z-index: 2;
    }

    .love-text {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 3;
      width: 96vw;
      max-width: 720px;
      color: #fff;
      font-family: "Comic Sans MS", "Arial Rounded MT Bold", "Microsoft YaHei", cursive;
      font-size: 13vw;
      font-weight: 900;
      letter-spacing: 0;
      line-height: 1;
      opacity: 0;
      pointer-events: none;
      text-align: center;
      white-space: normal;
      word-break: keep-all;
      text-shadow:
        0 0 12px rgba(255, 255, 255, 0.95),
        0 0 28px rgba(255, 93, 163, 0.95),
        0 0 72px rgba(255, 30, 108, 0.9);
      transform: translate(-50%, -50%) scale(0.96);
      transition: opacity 900ms ease, transform 900ms ease;
    }

    .love-text.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    @media (min-width: 421px) {
      .love-text { font-size: 56px; }
    }
  </style>
</head>
<body>
  <canvas id="heartCanvas"></canvas>
  <canvas id="scene"></canvas>
  <div class="love-text" id="loveText">I ❤ YOU</div>

  <script>
    (function () {
      var heartCanvas = null;
      var sceneCanvas = null;
      var loveText = null;
      var heartCtx = null;
      var sceneCtx = null;
      var width = 0;
      var height = 0;
      var count = 3;
      var counting = true;
      var frame = 0;
      var balloons = [];
      var heartDots = [];
      var stars = [];
      var initialized = false;

      function getSize() {
        var w = window.innerWidth;
        var h = window.innerHeight;
        w = w || document.documentElement.clientWidth || screen.width || 375;
        h = h || document.documentElement.clientHeight || screen.height || 667;
        return { w: Math.floor(w), h: Math.floor(h) };
      }

      function resize() {
        var s = getSize();
        if (s.w <= 0 || s.h <= 0) return;
        width = s.w;
        height = s.h;

        heartCanvas.width = width;
        heartCanvas.height = height;
        heartCanvas.style.width = width + "px";
        heartCanvas.style.height = height + "px";

        sceneCanvas.width = width;
        sceneCanvas.height = height;
        sceneCanvas.style.width = width + "px";
        sceneCanvas.style.height = height + "px";

        buildScene();
      }

      function buildScene() {
        var w = width || 375;
        var h = height || 667;
        var scale = Math.min(w * 0.022, h * 0.0135);
        var total = 190;
        heartDots = [];
        for (var i = 0; i < total; i++) {
          var t = (i / total) * Math.PI * 2;
          var x = 16 * Math.pow(Math.sin(t), 3);
          var y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
          heartDots.push({
            x: w / 2 + x * scale,
            y: h / 2 + y * scale,
            r: 2.3 + Math.random() * 2.2,
            phase: Math.random() * Math.PI * 2
          });
        }
        stars = [];
        for (var j = 0; j < 38; j++) {
          stars.push({
            x: Math.random() * w,
            y: Math.random() * h,
            r: 0.8 + Math.random() * 1.7,
            phase: Math.random() * Math.PI * 2,
            alpha: 0.24 + Math.random() * 0.5
          });
        }
        balloons = balloons.slice(-18);
      }

      function Balloon() {
        var colors = ["#ff4f8f", "#ff77aa", "#ffd263", "#fff1f5"];
        this.x = Math.random() * width;
        this.y = height + 40 + Math.random() * 160;
        this.r = 15 + Math.random() * 17;
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.vy = -0.65 - Math.random() * 0.85;
        this.vx = (Math.random() - 0.5) * 0.35;
        this.phase = Math.random() * Math.PI * 2;
      }

      Balloon.prototype.update = function () {
        this.phase += 0.025;
        this.x += this.vx + Math.sin(this.phase) * 0.2;
        this.y += this.vy;
        if (this.y < -70) {
          this.y = height + 70 + Math.random() * 120;
          this.x = Math.random() * width;
        }
      };

      Balloon.prototype.draw = function (ctx) {
        ctx.save();
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 18;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(255,255,255,0.62)";
        ctx.beginPath();
        ctx.arc(this.x - this.r * 0.35, this.y - this.r * 0.35, this.r * 0.22, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.46)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y + this.r);
        ctx.quadraticCurveTo(this.x - 8, this.y + this.r + 28, this.x + 2, this.y + this.r + 52);
        ctx.stroke();
        ctx.restore();
      };

      function drawCountdown() {
        if (width <= 0 || height <= 0) return;
        heartCtx.clearRect(0, 0, width, height);
        heartCtx.save();
        heartCtx.textAlign = "center";
        heartCtx.textBaseline = "middle";
        heartCtx.font = "900 " + Math.min(width * 0.54, height * 0.28, 220) + "px Arial, sans-serif";
        heartCtx.shadowColor = "rgba(255,105,180,0.98)";
        heartCtx.shadowBlur = 36;
        heartCtx.fillStyle = "#fff";
        heartCtx.fillText(String(count), width / 2, height / 2);
        heartCtx.shadowColor = "rgba(255,20,120,0.75)";
        heartCtx.shadowBlur = 88;
        heartCtx.fillText(String(count), width / 2, height / 2);
        heartCtx.restore();
      }

      function startCountdown() {
        if (width <= 0 || height <= 0) {
          resize();
        }
        if (width <= 0 || height <= 0) {
          setTimeout(startCountdown, 300);
          return;
        }
        drawCountdown();
        var timer = setInterval(function () {
          count -= 1;
          if (count > 0) {
            drawCountdown();
            return;
          }
          clearInterval(timer);
          counting = false;
          heartCtx.clearRect(0, 0, width, height);
          loveText.className = "love-text show";
        }, 1000);
      }

      function drawStars(ctx) {
        for (var i = 0; i < stars.length; i++) {
          var star = stars[i];
          var pulse = (Math.sin(frame * 0.035 + star.phase) + 1) * 0.5;
          ctx.fillStyle = "rgba(255, 238, 244, " + (star.alpha * (0.35 + pulse * 0.65)) + ")";
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.r * (0.8 + pulse * 0.5), 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawHeartOutline(ctx) {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        for (var i = 0; i < heartDots.length; i++) {
          var dot = heartDots[i];
          var pulse = (Math.sin(frame * 0.08 + dot.phase) + 1) * 0.5;
          var r = dot.r + pulse * 1.5;
          ctx.fillStyle = "rgba(255, 248, 250, " + (0.8 + pulse * 0.2) + ")";
          ctx.beginPath();
          ctx.arc(dot.x, dot.y, r, 0, Math.PI * 2);
          ctx.fill();
          if (i % 4 === 0) {
            ctx.fillStyle = "rgba(255, 78, 138, " + (0.3 + pulse * 0.24) + ")";
            ctx.beginPath();
            ctx.arc(dot.x, dot.y, r * 2.5, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        ctx.restore();
      }

      function animate() {
        frame += 1;
        if (width <= 0 || height <= 0) {
          requestAnimationFrame(animate);
          return;
        }
        sceneCtx.globalCompositeOperation = "source-over";
        sceneCtx.fillStyle = "rgba(0,0,0,0.18)";
        sceneCtx.fillRect(0, 0, width, height);

        if (!counting) {
          drawStars(sceneCtx);
          if (balloons.length < 22 && frame % 18 === 0) {
            balloons.push(new Balloon());
          }
          for (var i = 0; i < balloons.length; i++) {
            balloons[i].update();
            balloons[i].draw(sceneCtx);
          }
          drawHeartOutline(sceneCtx);
        }
        requestAnimationFrame(animate);
      }

      function init() {
        if (initialized) return;
        initialized = true;

        heartCanvas = document.getElementById("heartCanvas");
        sceneCanvas = document.getElementById("scene");
        loveText = document.getElementById("loveText");
        heartCtx = heartCanvas.getContext("2d");
        sceneCtx = sceneCanvas.getContext("2d");

        resize();
        if (width <= 0 || height <= 0) {
          setTimeout(function () {
            resize();
            if (width <= 0 || height <= 0) {
              width = 375;
              height = 667;
              resize();
            }
            startCountdown();
          }, 500);
        } else {
          setTimeout(startCountdown, 650);
        }

        animate();
        window.addEventListener("resize", resize);
        document.addEventListener("touchmove", function (e) { e.preventDefault(); }, { passive: false });
      }

      if (typeof WeixinJSBridge !== "undefined" && WeixinJSBridge.invoke) {
        init();
      } else {
        document.addEventListener("WeixinJSBridgeReady", init, false);
        document.addEventListener("DOMContentLoaded", function () {
          setTimeout(init, 300);
        }, false);
      }
    })();
  </script>
</body>
</html>
