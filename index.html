<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>I Love You</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{position:fixed;top:0;left:0;display:block}
#c1{z-index:1}
#c2{z-index:2}
#txt{
  position:fixed;left:50%;top:50%;z-index:3;
  color:#fff;font:900 13vw/1 "Arial Rounded MT Bold","Microsoft YaHei",sans-serif;
  opacity:0;pointer-events:none;text-align:center;
  text-shadow:0 0 12px rgba(255,255,255,.95),0 0 28px rgba(255,93,163,.9),0 0 72px rgba(255,30,108,.9);
  transform:translate(-50%,-50%) scale(.96);
  transition:opacity .9s ease,transform .9s ease;
  white-space:nowrap;
}
#txt.on{opacity:1;transform:translate(-50%,-50%) scale(1)}
@media(min-width:560px){#txt{font-size:66px}}
</style>
</head>
<body>
<canvas id="c1"></canvas>
<canvas id="c2"></canvas>
<div id="txt">I ❤ YOU</div>
<script>
var w=0,h=0,count=3,counting=true,frame=0,balloons=[],dots=[],stars=[],started=false,ctx1,ctx2,el1,el2,elt;

function dim(){
  var dw=document.documentElement.clientWidth||document.body.clientWidth||0;
  var dh=document.documentElement.clientHeight||document.body.clientHeight||0;
  var iw=window.innerWidth||0, ih=window.innerHeight||0;
  return {w:Math.floor(dw||iw||375),h:Math.floor(dh||ih||667)};
}

function setup(){
  var d=dim();
  if(d.w<=30||d.h<=30) return false;
  w=d.w; h=d.h;
  el1.width=w; el1.height=h; el1.style.width=w+'px'; el1.style.height=h+'px';
  el2.width=w; el2.height=h; el2.style.width=w+'px'; el2.style.height=h+'px';
  ctx1=el1.getContext('2d');
  ctx2=el2.getContext('2d');
  var sc=Math.min(w*.022,h*.0135), total=190;
  dots=[]; stars=[]; balloons=[];
  for(var i=0;i<total;i++){
    var t=(i/total)*Math.PI*2;
    dots.push({x:w/2+16*Math.pow(Math.sin(t),3)*sc, y:h/2-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))*sc, r:2.3+Math.random()*2.2, ph:Math.random()*Math.PI*2});
  }
  for(var j=0;j<38;j++) stars.push({x:Math.random()*w,y:Math.random()*h,r:.8+Math.random()*1.7,ph:Math.random()*Math.PI*2,a:.24+Math.random()*.5});
  return true;
}

function Balloon(){
  var cs=['#ff4f8f','#ff77aa','#ffd263','#fff1f5'];
  this.x=Math.random()*w; this.y=h+40+Math.random()*160;
  this.r=15+Math.random()*17; this.color=cs[Math.floor(Math.random()*cs.length)];
  this.vy=-.65-Math.random()*.85; this.vx=(Math.random()-.5)*.35; this.ph=Math.random()*Math.PI*2;
}
Balloon.prototype.upd=function(){this.ph+=.025;this.x+=this.vx+Math.sin(this.ph)*.2;this.y+=this.vy;if(this.y<-70){this.y=h+70+Math.random()*120;this.x=Math.random()*w;}};
Balloon.prototype.draw=function(c){
  c.save();c.shadowColor=this.color;c.shadowBlur=18;c.fillStyle=this.color;
  c.beginPath();c.arc(this.x,this.y,this.r,0,Math.PI*2);c.fill();c.shadowBlur=0;
  c.fillStyle='rgba(255,255,255,.62)';c.beginPath();c.arc(this.x-this.r*.35,this.y-this.r*.35,this.r*.22,0,Math.PI*2);c.fill();
  c.strokeStyle='rgba(255,255,255,.46)';c.lineWidth=1;c.beginPath();c.moveTo(this.x,this.y+this.r);
  c.quadraticCurveTo(this.x-8,this.y+this.r+28,this.x+2,this.y+this.r+52);c.stroke();c.restore();
};

function drawCountdown(){
  ctx1.clearRect(0,0,w,h);
  ctx1.save();ctx1.textAlign='center';ctx1.textBaseline='middle';
  ctx1.font='900 '+Math.min(w*.54,h*.28,220)+'px Arial,sans-serif';
  ctx1.shadowColor='rgba(255,105,180,.98)';ctx1.shadowBlur=36;ctx1.fillStyle='#fff';
  ctx1.fillText(String(count),w/2,h/2);
  ctx1.shadowColor='rgba(255,20,120,.75)';ctx1.shadowBlur=88;
  ctx1.fillText(String(count),w/2,h/2);
  ctx1.restore();
}

function goCountdown(){
  if(!setup()){
    setTimeout(goCountdown,200);return;
  }
  drawCountdown();
  var t=setInterval(function(){
    count--;
    if(count>0){drawCountdown();return;}
    clearInterval(t);counting=false;
    ctx1.clearRect(0,0,w,h);elt.className='on';
  },1000);
}

function drawStars(c){
  for(var i=0;i<stars.length;i++){
    var s=stars[i], p=(Math.sin(frame*.035+s.ph)+1)*.5;
    c.fillStyle='rgba(255,238,244,'+(s.a*(.35+p*.65))+')';
    c.beginPath();c.arc(s.x,s.y,s.r*(.8+p*.5),0,Math.PI*2);c.fill();
  }
}

function drawHeart(c){
  c.save();c.globalCompositeOperation='lighter';
  for(var i=0;i<dots.length;i++){
    var d=dots[i], p=(Math.sin(frame*.08+d.ph)+1)*.5, r=d.r+p*1.5;
    c.fillStyle='rgba(255,248,250,'+(.8+p*.2)+')';
    c.beginPath();c.arc(d.x,d.y,r,0,Math.PI*2);c.fill();
    if(i%4===0){c.fillStyle='rgba(255,78,138,'+(.3+p*.24)+')';c.beginPath();c.arc(d.x,d.y,r*2.5,0,Math.PI*2);c.fill();}
  }
  c.restore();
}

function loop(){
  frame++;
  if(w<=0||h<=0){requestAnimationFrame(loop);return;}
  ctx2.globalCompositeOperation='source-over';
  ctx2.fillStyle='rgba(0,0,0,.18)';ctx2.fillRect(0,0,w,h);
  if(!counting){
    drawStars(ctx2);
    if(balloons.length<22&&frame%18===0) balloons.push(new Balloon());
    for(var i=0;i<balloons.length;i++){balloons[i].upd();balloons[i].draw(ctx2);}
    drawHeart(ctx2);
  }
  requestAnimationFrame(loop);
}

function start(){
  if(started)return;started=true;
  el1=document.getElementById('c1');el2=document.getElementById('c2');elt=document.getElementById('txt');
  setup();
  setTimeout(function(){
    if(!setup()){w=375;h=667;setup();}
    goCountdown();loop();
  },200);
}

window.addEventListener('load',start,false);
setTimeout(function(){if(!started)start();},1200);
</script>
</body>
</html>
