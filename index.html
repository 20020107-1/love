<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>I Love You</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      overflow: hidden;
      background: #000;
      overscroll-behavior: none;
      touch-action: none;
    }

    body {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 50% 48%, rgba(255, 36, 112, 0.16), transparent 30%),
        radial-gradient(circle at 50% 82%, rgba(255, 210, 95, 0.08), transparent 24%),
        #000;
      font-family: "Arial Rounded MT Bold", "Microsoft YaHei", Arial, sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .love-text {
      position: fixed;
      left: 50%;
      top: var(--love-y, 48%);
      z-index: 2;
      width: 96vw;
      color: #fff;
      font-family: "Comic Sans MS", "Arial Rounded MT Bold", "Microsoft YaHei", cursive;
      font-size: clamp(38px, 13vw, 56px);
      font-weight: 900;
      letter-spacing: 0;
      line-height: 1;
      opacity: 0;
      pointer-events: none;
      text-align: center;
      text-shadow:
        0 0 12px rgba(255, 255, 255, 0.95),
        0 0 28px rgba(255, 93, 163, 0.95),
        0 0 72px rgba(255, 30, 108, 0.9);
      transform: translate(-50%, calc(-50% + 12px)) scale(0.96);
      transition: opacity 900ms ease, transform 900ms ease;
      white-space: nowrap;
    }

    .love-text.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div class="love-text" id="loveText">I ❤ YOU</div>

  <script>
    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");
    const loveText = document.getElementById("loveText");

    let width = 0;
    let height = 0;
    let dpr = 1;
    let frame = 0;
    let count = 3;
    let counting = true;
    let countStartedAt = 0;
    let countTimer = null;
    let balloons = [];
    let stars = [];
    let heartDots = [];
    let burstDots = [];

    function viewportSize() {
      const viewport = window.visualViewport;
      return {
        width: Math.floor(viewport ? viewport.width : window.innerWidth),
        height: Math.floor(viewport ? viewport.height : window.innerHeight)
      };
    }

    function centerY() {
      return height * 0.48;
    }

    function resize() {
      const size = viewportSize();
      width = size.width;
      height = size.height;
      dpr = Math.min(window.devicePixelRatio || 1, 1.2);
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      document.documentElement.style.setProperty("--love-y", `${centerY()}px`);
      buildScene();
    }

    function buildScene() {
      stars = Array.from({ length: 42 }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        r: 0.8 + Math.random() * 1.8,
        phase: Math.random() * Math.PI * 2,
        alpha: 0.22 + Math.random() * 0.58
      }));

      const scale = Math.min(width * 0.022, height * 0.0135);
      const total = 190;
      heartDots = Array.from({ length: total }, (_, index) => {
        const t = (index / total) * Math.PI * 2;
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = -(
          13 * Math.cos(t) -
          5 * Math.cos(2 * t) -
          2 * Math.cos(3 * t) -
          Math.cos(4 * t)
        );
        return {
          x: width / 2 + x * scale,
          y: centerY() + y * scale,
          r: 2.2 + Math.random() * 2.4,
          phase: Math.random() * Math.PI * 2
        };
      });

      balloons = balloons.slice(-24);
      burstDots = [];
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, width, height);
    }

    class Balloon {
      constructor() {
        const palette = ["#ff4f8f", "#ff77aa", "#ffd263", "#fff3f6"];
        this.x = Math.random() * width;
        this.y = height + 40 + Math.random() * 180;
        this.r = 15 + Math.random() * 16;
        this.color = palette[Math.floor(Math.random() * palette.length)];
        this.vy = -0.65 - Math.random() * 0.85;
        this.vx = (Math.random() - 0.5) * 0.35;
        this.phase = Math.random() * Math.PI * 2;
        this.alpha = 0.88 + Math.random() * 0.12;
      }

      update() {
        this.phase += 0.025;
        this.x += this.vx + Math.sin(this.phase) * 0.2;
        this.y += this.vy;
        if (this.y < -70) {
          this.y = height + 70 + Math.random() * 120;
          this.x = Math.random() * width;
        }
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 18;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(255,255,255,0.62)";
        ctx.beginPath();
        ctx.arc(this.x - this.r * 0.35, this.y - this.r * 0.35, this.r * 0.22, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.48)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y + this.r);
        ctx.quadraticCurveTo(this.x - 8, this.y + this.r + 30, this.x + 2, this.y + this.r + 54);
        ctx.stroke();
        ctx.restore();
      }
    }

    class BurstDot {
      constructor() {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.2 + Math.random() * 4.4;
        this.x = width / 2;
        this.y = centerY();
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 38 + Math.random() * 28;
        this.maxLife = this.life;
      }

      update() {
        this.vx *= 0.94;
        this.vy *= 0.94;
        this.x += this.vx;
        this.y += this.vy;
        this.life -= 1;
      }

      draw() {
        const alpha = Math.max(0, this.life / this.maxLife);
        ctx.fillStyle = `rgba(255, 244, 248, ${alpha})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2 + alpha * 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function startCountdown() {
      clearInterval(countTimer);
      count = 3;
      counting = true;
      countStartedAt = performance.now();
      loveText.classList.remove("show");

      countTimer = setInterval(() => {
        count -= 1;
        if (count <= 0) {
          clearInterval(countTimer);
          counting = false;
          loveText.classList.add("show");
          for (let i = 0; i < 70; i += 1) burstDots.push(new BurstDot());
        }
      }, 1000);
    }

    function drawCountdown() {
      const elapsed = performance.now() - countStartedAt;
      const progress = (elapsed % 1000) / 1000;
      const alpha = progress < 0.9 ? 1 : Math.max(0, 1 - (progress - 0.9) / 0.1);
      const fontSize = Math.min(width * 0.54, height * 0.28, 220);

      ctx.save();
      ctx.translate(width / 2, height / 2);
      ctx.globalAlpha = alpha;
      ctx.font = `900 ${fontSize}px Arial, Helvetica, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(255,105,180,0.98)";
      ctx.shadowBlur = 36;
      ctx.fillStyle = "#fff";
      ctx.fillText(String(count), 0, 0);
      ctx.shadowColor = "rgba(255,20,120,0.75)";
      ctx.shadowBlur = 90;
      ctx.fillText(String(count), 0, 0);
      ctx.restore();
    }

    function drawStars() {
      for (const star of stars) {
        const pulse = (Math.sin(frame * 0.035 + star.phase) + 1) * 0.5;
        ctx.fillStyle = `rgba(255, 238, 244, ${star.alpha * (0.35 + pulse * 0.65)})`;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.r * (0.8 + pulse * 0.5), 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawHeartOutline() {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      for (let i = 0; i < heartDots.length; i += 1) {
        const dot = heartDots[i];
        const pulse = (Math.sin(frame * 0.08 + dot.phase) + 1) * 0.5;
        const r = dot.r + pulse * 1.5;
        ctx.fillStyle = `rgba(255, 248, 250, ${0.78 + pulse * 0.22})`;
        ctx.beginPath();
        ctx.arc(dot.x, dot.y, r, 0, Math.PI * 2);
        ctx.fill();
        if (i % 4 === 0) {
          ctx.fillStyle = `rgba(255, 78, 138, ${0.28 + pulse * 0.24})`;
          ctx.beginPath();
          ctx.arc(dot.x, dot.y, r * 2.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.restore();
    }

    function spawnBalloons() {
      if (balloons.length < 22 && frame % 18 === 0) balloons.push(new Balloon());
    }

    function animate() {
      frame += 1;
      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = "rgba(0,0,0,0.18)";
      ctx.fillRect(0, 0, width, height);

      if (counting) {
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.fillRect(0, 0, width, height);
        drawCountdown();
        requestAnimationFrame(animate);
        return;
      }

      drawStars();
      spawnBalloons();
      for (const balloon of balloons) {
        balloon.update();
        balloon.draw();
      }

      ctx.globalCompositeOperation = "lighter";
      burstDots = burstDots.filter((dot) => dot.life > 0);
      for (const dot of burstDots) {
        dot.update();
        dot.draw();
      }
      drawHeartOutline();

      requestAnimationFrame(animate);
    }

    window.addEventListener("resize", resize);
    if (window.visualViewport) window.visualViewport.addEventListener("resize", resize);
    document.addEventListener("touchmove", (event) => event.preventDefault(), { passive: false });

    resize();
    animate();
    window.setTimeout(startCountdown, 650);
  </script>
</body>
</html>
