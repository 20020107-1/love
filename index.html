<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>I Love You</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      /* 使用 dvh 解决 iOS 工具栏遮挡问题 */
      height: 100dvh;
      overflow: hidden;
      background: #000;
      touch-action: none;
      overscroll-behavior: none;
      font-family: "Arial Rounded MT Bold", "Microsoft YaHei", Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 50% 56%, rgba(255, 45, 105, 0.08), transparent 34%),
        radial-gradient(circle at 50% 48%, rgba(255, 36, 112, 0.16), transparent 30%),
        radial-gradient(circle at 50% 82%, rgba(255, 210, 95, 0.08), transparent 24%),
        #000;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      width: 100dvw;
      height: 100dvh;
    }

    #heartCanvas {
      z-index: 1;
    }

    #scene {
      z-index: 2;
    }

    .love-text {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 3;
      width: 96vw;
      max-width: 720px;
      color: #fff;
      font-family: "Comic Sans MS", "Arial Rounded MT Bold", "Microsoft YaHei", cursive;
      font-size: clamp(38px, 13vw, 56px);
      font-weight: 900;
      letter-spacing: 0;
      line-height: 1;
      opacity: 0;
      pointer-events: none;
      text-align: center;
      /* 改为 normal，允许文字自动换行 */
      white-space: normal;
      text-shadow:
        0 0 12px rgba(255, 255, 255, 0.95),
        0 0 28px rgba(255, 93, 163, 0.95),
        0 0 72px rgba(255, 30, 108, 0.9);
      transform: translate(-50%, -50%) scale(0.96);
      transition: opacity 900ms ease, transform 900ms ease;
    }

    .love-text.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    @media (max-width: 520px) {
      .love-text {
        font-size: clamp(38px, 13vw, 54px);
      }
    }
  </style>
</head>
<body>
  <canvas id="heartCanvas"></canvas>
  <canvas id="scene"></canvas>
  <div class="love-text" id="loveText">I ❤ YOU</div>

  <script>
    const heartCanvas = document.getElementById("heartCanvas");
    const sceneCanvas = document.getElementById("scene");
    const loveText = document.getElementById("loveText");
    const heartCtx = heartCanvas.getContext("2d");
    const sceneCtx = sceneCanvas.getContext("2d");

    let width = 0;
    let height = 0;
    let dpr = 1;
    let count = 3;
    let counting = true;
    let frame = 0;
    let balloons = [];
    let heartDots = [];
    let stars = [];

    function viewportSize() {
      // 修复1：visualViewport 未就绪时用 innerWidth/Height 兜底
      const vw = window.visualViewport ? window.visualViewport.width : 0;
      const vh = window.visualViewport ? window.visualViewport.height : 0;
      // 修复2：如果 visualViewport 返回 0，用 window inner 尺寸
      const w = vw > 0 ? vw : window.innerWidth;
      const h = vh > 0 ? vh : window.innerHeight;
      return { width: Math.floor(w), height: Math.floor(h) };
    }

    function resizeCanvas() {
      const size = viewportSize();
      // 修复3：尺寸为 0 时跳过，等待下次 resize 事件
      if (size.width <= 0 || size.height <= 0) return;
      
      width = size.width;
      height = size.height;
      dpr = Math.min(window.devicePixelRatio || 1, 1.25);

      heartCanvas.width = Math.floor(width * dpr);
      heartCanvas.height = Math.floor(height * dpr);
      sceneCanvas.width = Math.floor(width * dpr);
      sceneCanvas.height = Math.floor(height * dpr);

      heartCanvas.style.width = `${width}px`;
      heartCanvas.style.height = `${height}px`;
      sceneCanvas.style.width = `${width}px`;
      sceneCanvas.style.height = `${height}px`;

      heartCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      sceneCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      buildScene();
    }

    function buildScene() {
      const scale = Math.min(width * 0.022, height * 0.0135);
      const total = 190;
      heartDots = Array.from({ length: total }, (_, index) => {
        const t = (index / total) * Math.PI * 2;
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = -(
          13 * Math.cos(t) -
          5 * Math.cos(2 * t) -
          2 * Math.cos(3 * t) -
          Math.cos(4 * t)
        );
        return {
          x: width / 2 + x * scale,
          y: height / 2 + y * scale,
          r: 2.3 + Math.random() * 2.2,
          phase: Math.random() * Math.PI * 2
        };
      });

      stars = Array.from({ length: 38 }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        r: 0.8 + Math.random() * 1.7,
        phase: Math.random() * Math.PI * 2,
        alpha: 0.24 + Math.random() * 0.5
      }));
      balloons = balloons.slice(-18);
    }

    class Balloon {
      constructor() {
        const colors = ["#ff4f8f", "#ff77aa", "#ffd263", "#fff1f5"];
        this.x = Math.random() * width;
        this.y = height + 40 + Math.random() * 160;
        this.r = 15 + Math.random() * 17;
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.vy = -0.65 - Math.random() * 0.85;
        this.vx = (Math.random() - 0.5) * 0.35;
        this.phase = Math.random() * Math.PI * 2;
      }

      update() {
        this.phase += 0.025;
        this.x += this.vx + Math.sin(this.phase) * 0.2;
        this.y += this.vy;
        if (this.y < -70) {
          this.y = height + 70 + Math.random() * 120;
          this.x = Math.random() * width;
        }
      }

      draw() {
        sceneCtx.save();
        sceneCtx.shadowColor = this.color;
        sceneCtx.shadowBlur = 18;
        sceneCtx.fillStyle = this.color;
        sceneCtx.beginPath();
        sceneCtx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        sceneCtx.fill();

        sceneCtx.shadowBlur = 0;
        sceneCtx.fillStyle = "rgba(255,255,255,0.62)";
        sceneCtx.beginPath();
        sceneCtx.arc(this.x - this.r * 0.35, this.y - this.r * 0.35, this.r * 0.22, 0, Math.PI * 2);
        sceneCtx.fill();

        sceneCtx.strokeStyle = "rgba(255,255,255,0.46)";
        sceneCtx.lineWidth = 1;
        sceneCtx.beginPath();
        sceneCtx.moveTo(this.x, this.y + this.r);
        sceneCtx.quadraticCurveTo(this.x - 8, this.y + this.r + 28, this.x + 2, this.y + this.r + 52);
        sceneCtx.stroke();
        sceneCtx.restore();
      }
    }

    function drawCountdown() {
      heartCtx.clearRect(0, 0, width, height);
      heartCtx.save();
      heartCtx.textAlign = "center";
      heartCtx.textBaseline = "middle";
      heartCtx.font = `900 ${Math.min(width * 0.54, height * 0.28, 220)}px Arial, sans-serif`;
      heartCtx.shadowColor = "rgba(255,105,180,0.98)";
      heartCtx.shadowBlur = 36;
      heartCtx.fillStyle = "#fff";
      heartCtx.fillText(String(count), width / 2, height / 2);
      heartCtx.shadowColor = "rgba(255,20,120,0.75)";
      heartCtx.shadowBlur = 88;
      heartCtx.fillText(String(count), width / 2, height / 2);
      heartCtx.restore();
    }

    function countdown() {
      drawCountdown();
      const timer = setInterval(() => {
        count -= 1;
        if (count > 0) {
          drawCountdown();
          return;
        }
        clearInterval(timer);
        counting = false;
        heartCtx.clearRect(0, 0, width, height);
        loveText.classList.add("show");
      }, 1000);
    }

    function drawStars() {
      for (const star of stars) {
        const pulse = (Math.sin(frame * 0.035 + star.phase) + 1) * 0.5;
        sceneCtx.fillStyle = `rgba(255, 238, 244, ${star.alpha * (0.35 + pulse * 0.65)})`;
        sceneCtx.beginPath();
        sceneCtx.arc(star.x, star.y, star.r * (0.8 + pulse * 0.5), 0, Math.PI * 2);
        sceneCtx.fill();
      }
    }

    function drawHeartOutline() {
      sceneCtx.save();
      sceneCtx.globalCompositeOperation = "lighter";
      for (let i = 0; i < heartDots.length; i += 1) {
        const dot = heartDots[i];
        const pulse = (Math.sin(frame * 0.08 + dot.phase) + 1) * 0.5;
        const r = dot.r + pulse * 1.5;
        sceneCtx.fillStyle = `rgba(255, 248, 250, ${0.8 + pulse * 0.2})`;
        sceneCtx.beginPath();
        sceneCtx.arc(dot.x, dot.y, r, 0, Math.PI * 2);
        sceneCtx.fill();
        if (i % 4 === 0) {
          sceneCtx.fillStyle = `rgba(255, 78, 138, ${0.3 + pulse * 0.24})`;
          sceneCtx.beginPath();
          sceneCtx.arc(dot.x, dot.y, r * 2.5, 0, Math.PI * 2);
          sceneCtx.fill();
        }
      }
      sceneCtx.restore();
    }

    function animate() {
      frame += 1;
      sceneCtx.globalCompositeOperation = "source-over";
      sceneCtx.fillStyle = "rgba(0,0,0,0.18)";
      sceneCtx.fillRect(0, 0, width, height);

      if (!counting) {
        drawStars();
        if (balloons.length < 22 && frame % 18 === 0) balloons.push(new Balloon());
        for (const balloon of balloons) {
          balloon.update();
          balloon.draw();
        }
        drawHeartOutline();
      }

      requestAnimationFrame(animate);
    }

    window.addEventListener("resize", resizeCanvas);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", resizeCanvas);
    }
    document.addEventListener("touchmove", (event) => event.preventDefault(), { passive: false });

    resizeCanvas();
    animate();
    setTimeout(countdown, 650);
  </script>
</body>
</html>
